<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUARATOGEL</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #2b0000, #000);
  color: white;
  overflow: hidden;
}

/* LOADING */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  color: gold;
  font-size: 28px;
  z-index: 999;
}

/* HERO */
.hero {
  display: none;
  height: 100vh;
  text-align: center;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* TITLE */
h1 {
  font-size: 70px;
  color: gold;
  text-shadow: 0 0 20px gold, 0 0 50px red;
}

/* BUTTON */
button {
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, red, gold);
  cursor: pointer;
  animation: pulse 1.5s infinite;
  font-weight: bold;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

/* LIVE RESULT */
#result {
  margin-top: 20px;
  font-size: 18px;
  color: gold;
}

/* NOTIF */
#notif {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #300000;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

/* CHAT */
#chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #300000;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
}

/* COUNTDOWN */
#countdown {
  margin-top: 10px;
  color: gold;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">Loading JUARATOGEL...</div>

<!-- MAIN -->
<div class="hero" id="main">
  <h1>JUARATOGEL</h1>
  <p>Platform Togel Modern & Terpercaya</p>

  <a href="https://loginjuaratogel.com" target="_blank">
    <button>LOGIN / DAFTAR</button>
  </a>

  <div id="result">Result: -</div>
  <div id="countdown">Redirect dalam 10 detik...</div>
</div>

<!-- NOTIF -->
<div id="notif"></div>

<!-- CHAT -->
<div id="chat">💬 CS Online</div>

<script>

/* LOADING */
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "flex";
  document.body.style.overflow = "auto";
}, 2000);

/* FAKE RESULT */
setInterval(() => {
  const num = Math.floor(Math.random()*9000)+1000;
  document.getElementById("result").innerHTML = "Result: " + num;
}, 3000);

/* NOTIF MENANG */
const notif = document.getElementById("notif");
const names = ["Budi","Andi","Rizky","Sari","Dewi"];
setInterval(() => {
  const name = names[Math.floor(Math.random()*names.length)];
  const win = Math.floor(Math.random()*900000)+100000;

  notif.innerHTML = `${name} menang Rp${win}`;
  notif.style.display = "block";

  setTimeout(() => notif.style.display="none", 3000);
}, 5000);

/* COUNTDOWN */
let time = 10;
const cd = document.getElementById("countdown");

const timer = setInterval(() => {
  time--;
  cd.innerHTML = "Redirect dalam " + time + " detik...";

  if(time <= 0){
    clearInterval(timer);
    window.location.href = "https://loginjuaratogel.com";
  }
}, 1000);

</script>

</body>
</html>
