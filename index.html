<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUARATOGEL</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #2b0000, #000);
  color: white;
  overflow: hidden;
}

/* LOADING BAR */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#bar {
  width: 0%;
  height: 10px;
  background: linear-gradient(90deg, red, gold);
  margin-top: 20px;
  transition: width 0.3s;
}

/* HERO */
.hero {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 70px;
  color: gold;
  text-shadow: 0 0 20px gold, 0 0 50px red;
}

/* BUTTON */
button {
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, red, gold);
  cursor: pointer;
  animation: pulse 1.5s infinite;
  font-weight: bold;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

/* RESULT */
#result {
  margin-top: 15px;
  color: gold;
}

/* NOTIF */
#notif {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #300000;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

/* CHAT */
#chatbox {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 200px;
  background: #300000;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}

/* COUNTDOWN */
#countdown {
  margin-top: 10px;
  color: gold;
}
</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div>Loading JUARATOGEL...</div>
  <div id="bar"></div>
</div>

<!-- MAIN -->
<div class="hero" id="main">
  <h1>JUARATOGEL</h1>
  <p>Platform Togel Modern & Terpercaya</p>

  <a href="https://heylink.me/juaralogin" target="_blank">
    <button>LOGIN / DAFTAR</button>
  </a>

  <div id="result">Result: -</div>
  <div id="countdown">Redirect dalam 12 detik...</div>
</div>

<!-- NOTIF -->
<div id="notif"></div>

<!-- CHAT -->
<div id="chatbox">
  💬 CS: Halo kak, butuh bantuan?
</div>

<script>

/* LOADING BAR */
let width = 0;
const bar = document.getElementById("bar");

const load = setInterval(() => {
  width += 10;
  bar.style.width = width + "%";

  if(width >= 100){
    clearInterval(load);
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "flex";
    document.body.style.overflow = "auto";
  }
}, 200);

/* LIVE RESULT */
setInterval(() => {
  const num = Math.floor(Math.random()*9000)+1000;
  document.getElementById("result").innerHTML = "Result: " + num;
}, 2500);

/* NOTIF MENANG */
const notif = document.getElementById("notif");
const names = ["Budi","Andi","Rizky","Sari","Dewi","Agus","Rina"];

setInterval(() => {
  const name = names[Math.floor(Math.random()*names.length)];
  const win = Math.floor(Math.random()*900000)+100000;

  notif.innerHTML = `${name} menang Rp${win}`;
  notif.style.display = "block";

  setTimeout(() => notif.style.display="none", 3000);
}, 4000);

/* CHAT AUTO */
const chat = document.getElementById("chatbox");
setInterval(() => {
  chat.innerHTML = "💬 CS: Deposit minimal 10k ya kak 😊";
}, 6000);

/* COUNTDOWN */
let time = 12;
const cd = document.getElementById("countdown");

const timer = setInterval(() => {
  time--;
  cd.innerHTML = "Redirect dalam " + time + " detik...";

  if(time <= 0){
    clearInterval(timer);
    window.location.href = "https://heylink.me/juaralogin";
  }
}, 1000);

</script>

</body>
</html>
